name: Poll abandoned carts

# Every 2 hours at :15 past. Offset from :00 to avoid GitHub's scheduler
# being clogged — on-the-hour schedules are notorious for running late
# during GH peak load.
on:
  schedule:
    - cron: '15 */2 * * *'
  workflow_dispatch: # adds a "Run workflow" button in the Actions tab for manual firing

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/poll-abandoned-carts
        run: |
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/poll-abandoned-carts")
          echo "$response"
          status=$(echo "$response" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          if [ "$status" -ne 200 ]; then
            echo "Cron returned HTTP $status — failing the job so GitHub notifies."
            exit 1
          fi
